tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              autocomplete: name
              type: text
              display: Name
              validate:
                - required
          -
            handle: email
            field:
              input_type: email
              autocomplete: email
              type: text
              display: Email
              validate:
                - required
          -
            handle: subject
            field:
              character_limit: 150
              type: text
              display: Subject
              validate:
                - required
                - 'max:150'
          -
            handle: message
            field:
              character_limit: 1000
              type: textarea
              display: Message
              validate:
                - 'max:1000'
